name: Build CI Image

on:
  push:
    branches: [main]
    paths:
      - '.github/ci/Dockerfile'
      - '.github/workflows/build-ci-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    name: Build PHP ${{ matrix.php }} image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/ci
          file: .github/ci/Dockerfile
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          tags: ghcr.io/${{ github.repository }}-ci:php-${{ matrix.php }}
          push: true
          cache-from: type=gha,scope=php-${{ matrix.php }}
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php }}
